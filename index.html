<html lang="fr">
<head>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');

/* ══════════════════════════════════════════
   ARENA 221 — eFootball Style
   Palette: Noir #0a0a0a | Vert néon #00FF87 | Rose #FF2D78 | Rouge #FF3D00 | Or #FFD700
══════════════════════════════════════════ */
:root {
    --green:  #00FF87;
    --pink:   #FF2D78;
    --red:    #FF3D00;
    --yellow: #FFD700;
    --white:  #FFFFFF;
    --black:  #0a0a0a;
    --dark:   #111111;
    --dark2:  #1a1a1a;
    --dark3:  #222222;

    --glass:  rgba(255,255,255,0.04);
    --glass2: rgba(255,255,255,0.08);
    --b:      rgba(255,255,255,0.1);
    --bg:     #0a0a0a;

    --t1: #FFFFFF;
    --t2: rgba(255,255,255,0.65);
    --t3: rgba(255,255,255,0.35);

    --fd: 'Anton', sans-serif;
    --fb: 'Barlow Condensed', sans-serif;
    --fm: 'Share Tech Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    font-family: var(--fb);
    background: var(--black);
    color: var(--t1);
    overflow-x: hidden;
    min-height: 100vh;
    cursor: default;
}

/* ── GRAIN OVERLAY ── */
body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--green); }

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.container { max-width: 1320px; margin: 0 auto; padding: 0 2rem; }
.main-content { min-height: 100vh; padding-top: 80px; padding-bottom: 56px; }
.page-section { padding: 6rem 0; }

/* ══════════════════════════════════════════
   NAVBAR
══════════════════════════════════════════ */
.navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: 80px;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,255,135,0.15);
}

.nav-container {
    display: flex; align-items: center; justify-content: space-between;
    height: 100%; padding: 0 2rem;
    max-width: 1320px; margin: 0 auto;
}

.nav-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; }
.nav-brand-text { display: flex; flex-direction: column; line-height: 1; }
.brand-name {
    font-family: var(--fd); font-size: 1.7rem; letter-spacing: .06em;
    color: var(--white);
}
.brand-name span { color: var(--green); }
.brand-location {
    font-family: var(--fm); font-size: .58rem; color: var(--t3);
    letter-spacing: .22em; text-transform: uppercase; margin-top: 1px;
}

.nav-links { display: flex; gap: 2px; align-items: center; }
.nav-link {
    color: var(--t2); text-decoration: none; font-size: .78rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; padding: 7px 13px;
    border-radius: 4px; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
}
.nav-link i { font-size: .7rem; }
.nav-link:hover, .nav-link.active { color: var(--green); background: rgba(0,255,135,.08); }

.nav-actions { display: flex; align-items: center; gap: 10px; }
.nav-user-info { display: flex; align-items: center; gap: 12px; }
.user-email { font-weight: 700; font-size: .875rem; }
.user-credits {
    font-family: var(--fm); font-size: .76rem; font-weight: 700; color: var(--yellow);
    background: rgba(255,215,0,.1); border: 1px solid rgba(255,215,0,.25);
    padding: 4px 12px; border-radius: 2px;
}
.nav-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; }
.nav-toggle span { width: 22px; height: 2px; background: var(--green); display: block; transition: .3s; }

/* ══════════════════════════════════════════
   CONTACT BAR
══════════════════════════════════════════ */
.contact-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
    background: rgba(10,10,10,.95); border-top: 1px solid rgba(0,255,135,.12);
    padding: 9px 0;
}
.contact-info {
    display: flex; justify-content: center; gap: 2.5rem;
    font-size: .72rem; font-family: var(--fm); color: var(--t3);
}
.contact-info span { display: flex; align-items: center; gap: 6px; transition: color .2s; }
.contact-info span:hover { color: var(--green); }
.contact-info i { color: var(--green); opacity: .7; }

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 26px; font-family: var(--fb);
    font-size: .85rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    text-decoration: none; border: none; cursor: pointer;
    transition: all .2s; white-space: nowrap;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn-primary {
    background: var(--green); color: var(--black); font-weight: 900;
    box-shadow: 0 0 20px rgba(0,255,135,.3);
}
.btn-primary:hover { background: #00ffaa; box-shadow: 0 0 35px rgba(0,255,135,.5); transform: translateY(-1px); }

.btn-pink {
    background: var(--pink); color: var(--white); font-weight: 900;
    box-shadow: 0 0 20px rgba(255,45,120,.3);
}
.btn-pink:hover { background: #ff4d8a; box-shadow: 0 0 35px rgba(255,45,120,.5); transform: translateY(-1px); }

.btn-secondary {
    background: transparent; border: 1px solid rgba(255,255,255,.2); color: var(--t1);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn-secondary:hover { border-color: var(--green); color: var(--green); }

.btn-outline {
    background: transparent; border: 2px solid var(--green); color: var(--green);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn-outline:hover { background: var(--green); color: var(--black); }

.btn-ghost { background: transparent; color: var(--t2); border: 1px solid transparent; clip-path: none; border-radius: 4px; }
.btn-ghost:hover { color: var(--t1); background: rgba(255,255,255,.06); }

.btn-sm  { padding: 6px 14px; font-size: .72rem; }
.btn-lg  { padding: 15px 36px; font-size: .95rem; }
.btn-xl  { padding: 18px 46px; font-size: 1.05rem; }

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 4px;
    padding: 1.75rem;
    transition: all .25s;
    position: relative; overflow: hidden;
}
.card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--green), var(--pink));
    opacity: 0; transition: opacity .3s;
}
.card:hover { border-color: rgba(0,255,135,.2); transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,.6); }
.card:hover::before { opacity: 1; }
.card-image { width: 100%; height: 190px; object-fit: cover; border-radius: 2px; margin-bottom: 1.25rem; }

/* ══════════════════════════════════════════
   SECTION TITLES
══════════════════════════════════════════ */
.section-title {
    font-family: var(--fd); font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: .04em; line-height: .9; color: var(--white);
    margin-bottom: 1rem; display: block;
    text-transform: uppercase;
}
.section-title .hi { color: var(--green); }
.section-title .pink { color: var(--pink); }
.section-subtitle { font-size: 1.05rem; color: var(--t2); max-width: 540px; margin: 0 auto; font-weight: 400; }
.section-header { text-align: center; margin-bottom: 3.5rem; }

/* Diagonal accent line */
.section-header::after {
    content: '';
    display: block; width: 60px; height: 3px; margin: 1rem auto 0;
    background: linear-gradient(90deg, var(--green), var(--pink));
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
}

/* ══════════════════════════════════════════
   EYEBROW
══════════════════════════════════════════ */
.eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--fm); font-size: .68rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--green); background: rgba(0,255,135,.08); border: 1px solid rgba(0,255,135,.25);
    padding: 5px 16px; margin-bottom: 1.5rem;
}
.eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: pulseDot 2s infinite;
}
@keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ══════════════════════════════════════════
   STATS ROW
══════════════════════════════════════════ */
.stats-row {
    display: flex; border: 1px solid rgba(255,255,255,.08);
    background: var(--dark2); margin-top: 3rem;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
.stat-item {
    flex: 1; padding: 1.5rem 1.8rem; text-align: center;
    border-right: 1px solid rgba(255,255,255,.08); transition: background .2s;
}
.stat-item:last-child { border-right: none; }
.stat-item:hover { background: rgba(0,255,135,.04); }
.stat-num {
    font-family: var(--fd); font-size: 2.8rem; letter-spacing: .02em;
    color: var(--green); line-height: 1; margin-bottom: 4px;
}
.stat-lbl { font-family: var(--fm); font-size: .62rem; color: var(--t3); text-transform: uppercase; letter-spacing: .15em; }

/* ══════════════════════════════════════════
   PLAYER CARDS (style eFootball)
══════════════════════════════════════════ */
.player-card {
    position: relative; width: 200px;
    background: linear-gradient(160deg, #1e1e1e, #111);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    transition: transform .3s, box-shadow .3s;
    flex-shrink: 0;
}
.player-card:hover { transform: translateY(-8px) rotate(-1deg); box-shadow: 0 24px 60px rgba(0,0,0,.8), 0 0 30px rgba(0,255,135,.2); }
.player-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(180deg, rgba(0,255,135,.15), transparent);
    z-index: 1; pointer-events: none;
}
.pc-rating {
    position: absolute; top: 10px; left: 12px; z-index: 3;
    font-family: var(--fd); font-size: 2.2rem; line-height: 1;
    color: var(--yellow); text-shadow: 0 0 20px rgba(255,215,0,.5);
}
.pc-pos {
    position: absolute; top: 52px; left: 15px; z-index: 3;
    font-family: var(--fm); font-size: .6rem; color: var(--t2); letter-spacing: .1em;
}
.pc-flag {
    position: absolute; top: 10px; right: 12px; z-index: 3;
    font-size: 1.6rem;
}
.pc-img {
    width: 100%; height: 200px; object-fit: cover; object-position: top center;
    display: block; filter: saturate(1.1);
}
.pc-bottom {
    padding: 10px 12px; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    position: relative; z-index: 3;
}
.pc-name {
    font-family: var(--fd); font-size: 1.1rem; letter-spacing: .06em;
    color: var(--white); text-align: center; margin-bottom: 2px;
}
.pc-team {
    font-family: var(--fm); font-size: .6rem; color: var(--t3);
    text-align: center; letter-spacing: .1em; text-transform: uppercase;
}
.pc-stats {
    display: flex; justify-content: space-between; margin-top: 8px;
    padding-top: 8px; border-top: 1px solid rgba(255,255,255,.08);
}
.pc-stat-item { text-align: center; }
.pc-stat-val { font-family: var(--fd); font-size: .9rem; color: var(--green); }
.pc-stat-key { font-family: var(--fm); font-size: .5rem; color: var(--t3); letter-spacing: .08em; }
.pc-rarity {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
}
.rarity-epic  { background: linear-gradient(90deg, var(--yellow), #ff8c00); }
.rarity-rare  { background: linear-gradient(90deg, var(--green), #0088ff); }
.rarity-super { background: linear-gradient(90deg, var(--pink), var(--red)); }

/* ══════════════════════════════════════════
   COUNTRY FLAGS (logos modernes)
══════════════════════════════════════════ */
.country-card {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 1.25rem 1rem; background: var(--dark2);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 4px; transition: all .2s; cursor: default;
    text-decoration: none;
}
.country-card:hover {
    border-color: var(--green); background: rgba(0,255,135,.05);
    transform: translateY(-4px);
}
.country-flag {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.1);
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; transition: border-color .2s; flex-shrink: 0;
}
.country-card:hover .country-flag { border-color: var(--green); }
.country-name { font-family: var(--fm); font-size: .62rem; color: var(--t2); text-transform: uppercase; letter-spacing: .1em; text-align: center; }

/* ══════════════════════════════════════════
   PAYMENT METHODS
══════════════════════════════════════════ */
.pay-method {
    display: flex; align-items: center; gap: 14px; padding: 14px 18px;
    background: var(--dark3); border: 1px solid rgba(255,255,255,.08);
    border-radius: 4px; cursor: pointer; transition: all .2s; width: 100%; text-align: left;
}
.pay-method:hover { border-color: var(--green); background: rgba(0,255,135,.06); transform: translateX(4px); }
.pay-method.selected { border-color: var(--green); background: rgba(0,255,135,.06); }
.pay-icon { width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.pay-name { font-weight: 700; font-size: .9rem; color: var(--t1); }
.pay-info { font-size: .75rem; color: var(--t3); font-family: var(--fm); }
.pay-arrow { margin-left: auto; color: var(--t3); transition: transform .2s; }
.pay-method:hover .pay-arrow, .pay-method.selected .pay-arrow { color: var(--green); transform: translateX(3px); }
.pay-instructions {
    background: rgba(0,255,135,.05); border: 1px solid rgba(0,255,135,.2);
    border-radius: 4px; padding: 1.25rem; margin-top: 1rem;
}
.pay-instructions .step { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
.pay-instructions .step:last-child { border-bottom: none; }
.step-num {
    width: 24px; height: 24px; border-radius: 50%; background: var(--green); color: var(--black);
    font-weight: 900; font-size: .72rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
}
.step-txt { font-size: .875rem; color: var(--t2); line-height: 1.5; }
.step-txt strong { color: var(--t1); }
.code-box {
    font-family: var(--fm); background: rgba(0,0,0,.4); border: 1px solid rgba(0,255,135,.25);
    padding: 7px 13px; font-size: .8rem; cursor: pointer; display: inline-flex;
    align-items: center; gap: 8px; margin-top: 5px; transition: border-color .2s;
}
.code-box:hover { border-color: var(--green); }

/* ══════════════════════════════════════════
   LOBBY
══════════════════════════════════════════ */
.chat-area {
    display: flex; flex-direction: column;
    background: var(--dark2); border: 1px solid rgba(255,255,255,.08);
    border-radius: 4px; overflow: hidden;
}
.chat-header { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,.3); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--green); }
.msg { display: flex; gap: 10px; align-items: flex-start; animation: msgIn .25s ease; }
.msg.mine { flex-direction: row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--fd); font-size: 1rem; flex-shrink: 0;
    background: linear-gradient(135deg, var(--green), var(--pink));
    color: var(--black);
}
.msg-body { max-width: 72%; }
.msg-meta { font-size: .65rem; color: var(--t3); font-family: var(--fm); margin-bottom: 3px; }
.msg.mine .msg-meta { text-align: right; }
.msg-text { background: var(--dark3); border: 1px solid rgba(255,255,255,.07); border-radius: 4px; padding: 9px 14px; font-size: .875rem; line-height: 1.5; word-break: break-word; }
.msg.mine .msg-text { background: rgba(0,255,135,.08); border-color: rgba(0,255,135,.2); }
.msg-code {
    font-family: var(--fm); background: rgba(0,0,0,.5); border: 1px solid rgba(0,255,135,.35);
    color: var(--green); padding: 8px 14px; font-size: .85rem;
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin-top: 4px;
    transition: all .2s;
}
.msg-code:hover { background: rgba(0,255,135,.1); }
.chat-input { flex: 1; background: none; border: none; outline: none; font-family: var(--fb); font-size: .875rem; color: var(--t1); }
.chat-input::placeholder { color: var(--t3); }
.lobby-room { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: 4px; cursor: pointer; transition: background .15s; }
.lobby-room:hover { background: rgba(255,255,255,.04); }
.lobby-room.active { background: rgba(0,255,135,.08); border: 1px solid rgba(0,255,135,.18); }
.room-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.room-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.room-dot.busy { background: var(--yellow); }
.room-name { font-weight: 700; font-size: .875rem; }
.room-count { font-family: var(--fm); font-size: .62rem; color: var(--t3); margin-top: 1px; }
.online-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--black);
    background: linear-gradient(135deg, var(--green), var(--pink));
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-family: var(--fd); color: var(--black); margin-left: -8px;
}
.online-avatar:first-child { margin-left: 0; }
.code-toggle { font-size: .8rem; color: var(--t3); cursor: pointer; transition: color .2s; padding: 3px; background: none; border: none; }
.code-toggle:hover, .code-toggle.active { color: var(--green); }

/* ══════════════════════════════════════════
   FORMS
══════════════════════════════════════════ */
.form-group { margin-bottom: 1.2rem; }
.form-label { display: block; font-size: .7rem; font-weight: 700; color: var(--t3); letter-spacing: .15em; text-transform: uppercase; margin-bottom: .45rem; font-family: var(--fm); }
.form-input {
    width: 100%; padding: 12px 15px; font-family: var(--fb); font-size: 1rem;
    color: var(--t1); background: var(--dark3); border: 1px solid rgba(255,255,255,.1);
    border-radius: 0; transition: all .2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.form-input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 1px rgba(0,255,135,.2); }
.form-input::placeholder { color: var(--t3); }

/* ══════════════════════════════════════════
   GRIDS
══════════════════════════════════════════ */
.grid { display: grid; gap: 1.5rem; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(340px,1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); }
.grid-5 { grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); }

let _currentProfile = null;

// ══════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════
const AppAuth = {
    async signup(email, password, pseudo, phone) {
        const { data, error } = await _db.auth.signUp({
            email, password,
            options: { data: { pseudo, phone: phone || null } }
        });
        if (error) throw new Error(error.message);
        showToast('✅ Compte créé ! Vérifie ton email si demandé.', 'success');
        return data.user;
    },

    async login(email, password) {
        const { data, error } = await _db.auth.signInWithPassword({ email, password });
        if (error) throw new Error('Email ou mot de passe incorrect');
        _currentUser    = data.user;
        _currentProfile = await this._fetchProfile(data.user.id);
        updateNavbar();
        return _currentProfile;
    },

    async logout() {
        await _db.auth.signOut();
        _currentUser    = null;
        _currentProfile = null;
        updateNavbar();
        window.location.hash = '#/';
        showToast('👋 Déconnecté', 'info');
    },

    async getProfile() {
        if (_currentProfile) return _currentProfile;
        try {
            // D'abord essayer la session (plus rapide, pas de lock)
            const { data: sessionData } = await _db.auth.getSession();
            const user = sessionData?.session?.user;
            if (!user) return null;
            _currentUser    = user;
            _currentProfile = await this._fetchProfile(user.id);
            return _currentProfile;
        } catch {
            return null;
        }
    },

    async _fetchProfile(uid) {
        const { data } = await _db.from('profiles').select('*').eq('id', uid).single();
        return data;
    },

    isAdmin() { return _currentProfile && ['super_admin','tournament_admin'].includes(_currentProfile.role); },
    isSuperAdmin() { return _currentProfile?.role === 'super_admin'; },

    onStateChange(cb) {
        _db.auth.onAuthStateChange(async (event, session) => {
            if (session?.user) {
                _currentUser    = session.user;
                _currentProfile = await this._fetchProfile(session.user.id);
            } else {
                _currentUser = _currentProfile = null;
            }
            updateNavbar();
            cb(event, _currentProfile);
        });
    }
};

const TournamentDB = {
    async getAll() {
        const { data, error } = await _db
            .from('tournaments')
            .select('*, registrations(id, payment_status)')
            .order('created_at', { ascending: false });
        if (error) throw error;
        return data || [];
    },

    async getById(id) {
        const { data, error } = await _db
            .from('tournaments')
            .select(`*, registrations(id, payment_status, player:profiles!registrations_player_id_fkey(id,pseudo,points,wins,losses,draws))`)
            .eq('id', id)
            .single();
        if (error) throw error;
        return data;
    },

    async create({ name, description, entry_fee, prize_pool, max_players, start_date, payment_deadline }) {
        const profile = await AppAuth.getProfile();
        const { data, error } = await _db.from('tournaments').insert({
            name, description, entry_fee, prize_pool, max_players,
            start_date, payment_deadline, created_by: profile.id
        }).select().single();
        if (error) throw new Error(error.message);
        return data;
    },

// ══════════════════════════════════════════════════════════
//  INSCRIPTIONS & PAIEMENTS
// ══════════════════════════════════════════════════════════
const RegistrationDB = {
    async register(tournamentId, paymentMethod, phone) {
        const profile = await AppAuth.getProfile();
        if (!profile) throw new Error('Connecte-toi d\'abord');

        const tournament = await TournamentDB.getById(tournamentId);
        if (!tournament) throw new Error('Tournoi introuvable');
        if (tournament.status !== 'open') throw new Error('Les inscriptions sont fermées');

        const confirmed = (tournament.registrations || []).filter(r => r.payment_status === 'confirmed').length;
        if (confirmed >= tournament.max_players) throw new Error('Tournoi complet');

        const already = (tournament.registrations || []).find(r => r.player?.id === profile.id);
        if (already) throw new Error('Tu es déjà inscrit à ce tournoi');

        // Créer l'inscription
        const { data: reg, error: regErr } = await _db.from('registrations').insert({
            tournament_id: tournamentId,
            player_id: profile.id,
            payment_status: 'pending',
            payment_method: paymentMethod,
            amount_paid: tournament.entry_fee
        }).select().single();
        if (regErr) throw new Error(regErr.message);

        // Enregistrer le paiement en attente
        await _db.from('payments').insert({
            player_id: profile.id,
            tournament_id: tournamentId,
            registration_id: reg.id,
            type: 'inscription',
            direction: 'in',
            amount: tournament.entry_fee,
            method: paymentMethod,
            phone: phone || null,
            status: 'pending',
            note: `Inscription ${tournament.name} — ${profile.pseudo}`
        });

        return reg;
    },

    async getMyRegistrations() {
        const profile = await AppAuth.getProfile();
        if (!profile) return [];
        const { data } = await _db.from('registrations')
            .select('*, tournament:tournaments(id,name,entry_fee,prize_pool,status,start_date)')
            .eq('player_id', profile.id)
            .order('created_at', { ascending: false });
        return data || [];
    },

    async getPending() {
        const { data } = await _db.from('registrations')
            .select('*, player:profiles!registrations_player_id_fkey(pseudo,phone), tournament:tournaments(name,entry_fee)')
            .eq('payment_status', 'pending')
            .order('created_at', { ascending: false });
        return data || [];
    },

    async confirm(regId, ref = '') {
        const profile = await AppAuth.getProfile();
        const { error: e1 } = await _db.from('registrations').update({
            payment_status: 'confirmed',
            payment_ref:    ref || null,
            paid_at:        new Date().toISOString(),
            confirmed_by:   profile.id,
            confirmed_at:   new Date().toISOString()
        }).eq('id', regId);
        if (e1) { showToast('Erreur: ' + e1.message, 'error'); throw e1; }
        await _db.from('payments').update({ status: 'confirmed', reference: ref || null })
            .eq('registration_id', regId);
        showToast('✅ Paiement confirmé — joueur ajouté !', 'success');
    },

    async reject(regId) {
        await _db.from('registrations').update({ payment_status: 'rejected' }).eq('id', regId);
        await _db.from('payments').update({ status: 'rejected' }).eq('registration_id', regId);
        showToast('🚫 Paiement rejeté', 'info');
    }
};

function updateNavbar() {
    const p       = _currentProfile;
    const navUser = document.getElementById('navUser');
    const navGuest= document.getElementById('navGuest');
    const navPseudo= document.getElementById('navPseudo');
    const authLinks  = document.querySelectorAll('.nav-auth');
    const adminLinks = document.querySelectorAll('.nav-admin');

    if (p) {
        if (navUser)  { navUser.style.display  = 'flex'; }
        if (navGuest) { navGuest.style.display = 'none'; }
        if (navPseudo){ navPseudo.textContent   = p.pseudo; }
        authLinks.forEach(l  => l.style.display = 'flex');
        adminLinks.forEach(l => l.style.display = AppAuth.isAdmin() ? 'flex' : 'none');
    } else {
        if (navUser)  { navUser.style.display  = 'none'; }
        if (navGuest) { navGuest.style.display = 'flex'; }
        authLinks.forEach(l  => l.style.display = 'none');
        adminLinks.forEach(l => l.style.display = 'none');
    }
}

/* ══════════════════════════════════════════
   TIRAGES
══════════════════════════════════════════ */
const DrawDB = {

    async getByTournament(tid) {
        const { data, error } = await _db
            .from('draws')
            .select('*')
            .eq('tournament_id', tid)
            .order('created_at', { ascending: false });
        if (error) throw error;
        return data;
    },

    async create(tid, round, players) {
        // Mélange aléatoire (Fisher-Yates)
        const shuffled = [...players];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        // Créer les paires
        const matches = [];
        for (let i = 0; i < shuffled.length - 1; i += 2) {
            matches.push({ p1: shuffled[i], p2: shuffled[i+1] || 'BYE' });
        }
        const { data, error } = await _db.from('draws').insert({
            tournament_id: tid,
            round,
            matches,
            status: 'done',
            drawn_at: new Date().toISOString()
        }).select().single();
        if (error) throw error;
        return data;
    },

    onNew(callback) {
        return _db.channel('draws_realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'draws' }, callback)
            .subscribe();
    }
};

    renderFlag(code) {
        const f = this.flags[code];
        if (!f) return '';
        return `
            <div class="country-card" title="${f.name}">
                <div class="country-flag" style="background:linear-gradient(135deg,${f.colors[0]},${f.colors[1]},${f.colors[2]});font-size:2.4rem;line-height:1">
                    ${f.emoji}
                </div>
                <div class="country-name">${f.name}</div>
            </div>
        `;
    },

    /* ── PLAYER CARD component ── */
    renderPlayerCard(p) {
        const uid = 'pc_' + p.name.replace(/[^a-z]/gi,'_');
        setTimeout(() => {
            const img = document.getElementById(uid);
            if (!img) return;
            // Essayer Wikipedia API
            if (p.wiki) {
                fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(p.wiki))
                    .then(r => r.json())
                    .then(d => {
                        const url = d?.thumbnail?.source || d?.originalimage?.source;
                        if (url) { img.src = url; img.style.display = 'block'; document.getElementById(uid+'_fb').style.display='none'; }
                    }).catch(()=>{});
            }
        }, 200);
        return `
            <div class="player-card ${p.rarity==='epic'?'green-glow':p.rarity==='super'?'pink-glow':'blue-glow'}" style="position:relative">
                <div class="pc-rating">${p.rating}</div>
                <div class="pc-pos">${p.pos}</div>
                <div class="pc-flag">${p.flag}</div>
                ${p.rarity==='epic'?'<div style="position:absolute;top:8px;right:8px;font-size:.55rem;font-family:Share Tech Mono,monospace;color:var(--yellow);letter-spacing:.1em">ICON</div>':''}
                <div style="height:200px;background:linear-gradient(160deg,${p.bgTop},${p.bgBot});display:flex;align-items:flex-end;justify-content:center;overflow:hidden;position:relative">
                    <div style="position:absolute;inset:0;background:${p.glare};z-index:1"></div>
                    <img id="${uid}" src="" alt="${p.name}" style="display:none;height:200px;width:100%;object-fit:cover;object-position:top center;position:relative;z-index:2;filter:drop-shadow(0 0 20px ${p.glow})"/>
                    <div id="${uid}_fb" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative;z-index:2">${p.emoji}</div>
                </div>
                <div class="pc-bottom">
                    <div class="pc-name">${p.name}</div>
                    <div class="pc-team" style="font-size:.6rem;opacity:.7">${p.team}</div>
                    <div class="pc-stats">
                        ${p.stats.map(s=>`<div class="pc-stat-item"><div class="pc-stat-val">${s.v}</div><div class="pc-stat-key">${s.k}</div></div>`).join('')}
                    </div>
                </div>
                <div class="pc-rarity ${p.rarity==='epic'?'rarity-epic':p.rarity==='rare'?'rarity-rare':'rarity-super'}"></div>
            </div>
        `;
    }
}

// ══════════════════════════════════════════════════════════
//  LOBBY — Chat + Sessions + Tirages en temps réel
// ══════════════════════════════════════════════════════════
const Lobby = {
    _channel: null,
    _sessionChannel: null,
    _profile: null,
    _session: null,
    _isAdmin: false,

    async init() {
        const container = document.getElementById('lobbyMessages');
        if (!container) return;

        this._profile = await AppAuth.getProfile();
        this._isAdmin = ['admin','super_admin'].includes(this._profile?.role);

        // Charger la session active
        await this._loadSession();

        // Charger les messages
        await this._loadMessages(container);

        // Écouter les nouveaux messages
        this._listenRealtime(container);

        // Écouter les changements de session (ouverture/fermeture)
        this._listenSession();

        // Afficher les boutons admin
        if (this._isAdmin) this._renderAdminBtns();

        // Formulaire d'envoi
        document.getElementById('lobbyForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('lobbyInput');
            const btn   = document.getElementById('lobbySendBtn');
            const msg   = input?.value?.trim();
            if (!msg) return;
            btn.disabled = true;
            await this._sendMessage(msg);
            input.value = '';
            btn.disabled = false;
            input.focus();
        });
    },

    async _loadSession() {
        try {
            this._session = await LobbySessionDB.getCurrent();
        } catch(e) {
            this._session = null;
        }
        this._updateSessionUI();
    },

    _updateSessionUI() {
        const session   = this._session;
        const isOpen    = session?.is_open !== false;
        const banner    = document.getElementById('lobbySessionBanner');
        const form      = document.getElementById('lobbyForm');
        const closed    = document.getElementById('lobbyClosed');
        const loginMsg  = document.getElementById('lobbyLoginMsg');
        const dot       = document.getElementById('lobbyDot');
        const titleEl   = document.getElementById('lobbySessionTitle');

        if (titleEl && session?.title) titleEl.textContent = session.title.toUpperCase();

        if (dot) {
            dot.style.background = isOpen ? 'var(--green)' : 'var(--red)';
            dot.style.boxShadow  = isOpen ? '0 0 8px var(--green)' : '0 0 8px var(--red)';
            dot.style.animation  = isOpen ? 'pulse 2s infinite' : 'none';
        }

        if (!isOpen) {
            if (form)    form.style.display    = 'none';
            if (closed)  closed.style.display  = 'block';
            if (loginMsg) loginMsg.style.display = 'none';
            if (banner)  banner.innerHTML = `
                <div style="background:rgba(255,61,0,.08);border:1px solid rgba(255,61,0,.2);padding:.75rem 1rem;font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--red);text-align:center">
                    🔒 SESSION FERMÉE PAR L'ADMIN
                </div>`;
        } else {
            if (closed)  closed.style.display  = 'none';
            if (banner)  banner.innerHTML = '';
            if (!this._profile) {
                if (loginMsg) loginMsg.style.display = 'block';
                if (form)     form.style.display     = 'none';
            } else {
                if (loginMsg) loginMsg.style.display = 'none';
                if (form)     form.style.display     = 'flex';
            }
        }
    },

    _renderAdminBtns() {
        const btns = document.getElementById('lobbyAdminBtns');
        if (!btns) return;
        btns.style.display = 'flex';
        btns.innerHTML = `
            <button onclick="Lobby.openNewSession()" class="btn btn-primary btn-sm">
                <i class="fas fa-play"></i> Ouvrir session
            </button>
            <button onclick="Lobby.closeSession()" class="btn btn-sm" style="background:rgba(255,61,0,.15);border:1px solid rgba(255,61,0,.3);color:var(--red)">
                <i class="fas fa-stop"></i> Fermer session
            </button>
            <button onclick="Lobby.openDrawModal()" class="btn btn-sm" style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);color:var(--yellow)">
                <i class="fas fa-shuffle"></i> Tirage au sort
            </button>
        `;
    },

    // ── Ouvrir une nouvelle session ──
    async openNewSession() {
        const title = prompt('Titre de la session (ex: "Coupe Ramadan — Phase de groupes")') || 'Session Arena 221';
        try {
            this._session = await LobbySessionDB.open(title);
            this._updateSessionUI();
            if (this._isAdmin) this._renderAdminBtns();
            showToast('✅ Session ouverte !', 'success');
        } catch(e) { showToast(e.message, 'error'); }
    },

    // ── Fermer la session ──
    async closeSession() {
        if (!this._session) return showToast('Aucune session active', 'warning');
        if (!confirm('Fermer la session ? Les joueurs ne pourront plus écrire.')) return;
        try {
            await LobbySessionDB.close(this._session.id);
            this._session = { ...this._session, is_open: false };
            this._updateSessionUI();
            showToast('🔒 Session fermée', 'info');
        } catch(e) { showToast(e.message, 'error'); }
    },

    // ── Modal tirage au sort ──
    async openDrawModal() {
        // Charger les tournois avec leurs joueurs confirmés
        const { data: tournaments } = await _db
            .from('tournaments')
            .select('id, name, max_players, status, registrations(player_id, payment_status, profiles(pseudo))')
            .eq('status', 'open');

        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'drawModal';
        modal.innerHTML = `
            <div class="card modal-content" style="max-width:520px;border-color:rgba(255,215,0,.2)">
                <div class="corner-accent tl"></div><div class="corner-accent tr"></div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
                    <div style="font-family:'Anton',sans-serif;font-size:1.5rem;text-transform:uppercase;letter-spacing:.04em">
                        <i class="fas fa-shuffle" style="color:var(--yellow)"></i> Tirage au sort
                    </div>
                    <button onclick="document.getElementById('drawModal').remove()" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:1.3rem;cursor:pointer">✕</button>
                </div>

                <div class="form-group">
                    <label class="form-label">Tournoi</label>
                    <select id="drawTournoi" class="form-input" onchange="Lobby._updateDrawStatus()">
                        <option value="">— Choisir un tournoi —</option>
                        ${(tournaments||[]).map(t => {
                            const total = (t.registrations||[]).filter(r=>['confirmed','pending'].includes(r.payment_status)).length;
                            return `<option value="${t.id}">${t.name} (${total}/${t.max_players} joueurs)</option>`;
                        }).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Tour / Phase</label>
                    <div id="drawStatus" style="margin-top:.5rem"></div>
                    <input type="text" id="drawRound" class="form-input" placeholder="Phase de groupes, Quarts de finale..." value="Phase de groupes">
                </div>

                <div id="drawPreview" style="margin-bottom:1rem"></div>

                <div style="display:flex;gap:.75rem">
                    <button onclick="Lobby.previewDraw()" class="btn btn-secondary" style="flex:1;clip-path:none;border-radius:4px">
                        <i class="fas fa-eye"></i> Aperçu
                    </button>
                    <button onclick="Lobby.confirmDraw()" class="btn btn-primary" style="flex:1">
                        <i class="fas fa-check"></i> Confirmer & Publier
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        // Stocker les tournois pour accès dans previewDraw
        modal._tournaments = tournaments || [];
    },

    _getTournoiPlayers(tid) {
        const modal = document.getElementById('drawModal');
        const t = (modal?._tournaments || []).find(t => t.id === tid);
        if (!t) return [];
        return (t.registrations || [])
            .filter(r => r.payment_status === 'confirmed')
            .map(r => ({ id: r.player_id, pseudo: r.profiles?.pseudo || 'Joueur' }));
    },

    _updateDrawStatus() {
        const tid = document.getElementById('drawTournoi')?.value;
        const statusDiv = document.getElementById('drawStatus');
        if (!statusDiv || !tid) return;
        const modal = document.getElementById('drawModal');
        const t = (modal?._tournaments || []).find(t => t.id === tid);
        if (!t) return;
        const confirmes = (t.registrations || []).filter(r => r.payment_status === 'confirmed').length;
        const max = t.max_players || 0;
        const complet = confirmes >= max;
        statusDiv.innerHTML = complet
            ? `<div style="background:rgba(0,255,135,.1);border:1px solid rgba(0,255,135,.3);padding:.6rem 1rem;border-radius:8px;font-size:.75rem;color:var(--green);font-family:'Share Tech Mono',monospace">
                ✅ Tournoi complet — ${confirmes}/${max} joueurs confirmés — Tirage possible !
               </div>`
            : `<div style="background:rgba(255,61,0,.1);border:1px solid rgba(255,61,0,.3);padding:.6rem 1rem;border-radius:8px;font-size:.75rem;color:var(--red);font-family:'Share Tech Mono',monospace">
                ⛔ Inscriptions incomplètes — ${confirmes}/${max} joueurs confirmés. Attends que le tournoi soit complet.
               </div>`;
    },

    previewDraw() {
        const tid   = document.getElementById('drawTournoi')?.value;
        const round = document.getElementById('drawRound')?.value;
        const prev  = document.getElementById('drawPreview');
        if (!tid) return showToast('Choisis un tournoi', 'warning');

        // Vérifier que le tournoi est complet
        const t = (document.getElementById('drawModal')?._tournaments || []).find(t => t.id === tid);
        if (t) {
            const confirmes = (t.registrations || []).filter(r => r.payment_status === 'confirmed').length;
            const maxPlayers = t.max_players || 0;
            if (confirmes < maxPlayers) {
                return showToast(`⛔ Inscriptions incomplètes — ${confirmes}/${maxPlayers} joueurs confirmés. Attends que tous les joueurs soient inscrits.`, 'error');
            }
        }

        const players = this._getTournoiPlayers(tid);
        if (players.length < 2) return showToast('Il faut au moins 2 joueurs inscrits pour faire un tirage', 'warning');

        // Simuler le tirage
        const shuffled = [...players].sort(() => Math.random() - 0.5);
        const pairs = [];
        for (let i = 0; i < shuffled.length - 1; i += 2)
            pairs.push([shuffled[i], shuffled[i+1]]);
        if (shuffled.length % 2 !== 0)
            pairs.push([shuffled[shuffled.length-1], { pseudo: 'BYE' }]);

        prev.innerHTML = `
            <div style="background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);padding:1rem;margin-bottom:.5rem">
                <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--yellow);margin-bottom:.75rem;text-transform:uppercase">
                    ${round} — ${players.length} joueurs — ${pairs.length} matchs
                </div>
                ${pairs.map((p, i) => `
                    <div style="display:flex;align-items:center;gap:.75rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05)">
                        <span style="font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--t3);width:20px">M${i+1}</span>
                        <span style="font-weight:700;flex:1">${p[0].pseudo}</span>
                        <span style="color:var(--pink);font-family:'Anton',sans-serif">VS</span>
                        <span style="font-weight:700;flex:1;text-align:right">${p[1].pseudo}</span>
                    </div>
                `).join('')}
            </div>
        `;
        // Stocker pour confirmDraw
        document.getElementById('drawModal')._pairs  = pairs;
        document.getElementById('drawModal')._tid    = tid;
        document.getElementById('drawModal')._round  = round;
    },

    async confirmDraw() {
        const modal = document.getElementById('drawModal');
        if (!modal?._pairs) return showToast('Fais d\'abord un aperçu', 'warning');

        try {
            const players = modal._pairs.flatMap(p => [p[0].id, p[1].id].filter(Boolean));
            const draw = await DrawDB.create(modal._tid, modal._round, players);

            // Publier dans le chat
            const pairs  = modal._pairs;
            const round  = modal._round;
            let msg = `🎲 TIRAGE AU SORT — ${round}\n`;
            pairs.forEach((p, i) => {
                msg += `Match ${i+1}: ${p[0].pseudo} ⚔️ ${p[1].pseudo}\n`;
            });

            await this._sendSystemMessage(msg);
            modal.remove();
            showToast('✅ Tirage publié dans le lobby !', 'success');
        } catch(e) { showToast(e.message, 'error'); }
    },

    async _sendSystemMessage(text) {
        // Message système posté par l'admin dans le chat
        const { error } = await _db.from('lobby_messages').insert({
            player_id: this._profile.id,
            pseudo:    '🎮 ARENA 221',
            message:   text,
            session_id: this._session?.id || null
        });
        if (error) throw error;
    },

    async _loadMessages(container) {
        container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.75rem">Chargement...</div>`;
        try {
            const { data, error } = await _db
                .from('lobby_messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(80);
            if (error) throw error;
            container.innerHTML = '';
            if (!data.length) {
                container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.75rem">Sois le premier à écrire 👋</div>`;
                return;
            }
            data.forEach(m => this._appendMessage(container, m));
            this._scrollBottom(container);
        } catch(e) {
            container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--red);font-size:.8rem">${e.message}</div>`;
        }
    },

    _listenRealtime(container) {
        if (this._channel) _db.removeChannel(this._channel);
        this._channel = _db.channel('lobby_msgs')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'lobby_messages' }, (payload) => {
                container.querySelector('[data-empty]')?.remove();
                this._appendMessage(container, payload.new);
                this._scrollBottom(container);
            })
            .subscribe();
    },

    _listenSession() {
        if (this._sessionChannel) _db.removeChannel(this._sessionChannel);
        this._sessionChannel = _db.channel('lobby_sess')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'lobby_sessions' }, async () => {
                await this._loadSession();
            })
            .subscribe();
    },

    async _sendMessage(text) {
        if (!this._profile) return showToast('Connecte-toi', 'warning');
        if (!this._session?.is_open) return showToast('Session fermée', 'warning');
        const { error } = await _db.from('lobby_messages').insert({
            player_id:  this._profile.id,
            pseudo:     this._profile.pseudo,
            message:    text,
            session_id: this._session?.id || null
        });
        if (error) showToast(error.message, 'error');
    },

    _appendMessage(container, m) {
        const isMe     = this._profile && m.player_id === this._profile.id;
        const isSystem = m.pseudo === '🎮 ARENA 221';
        const div      = document.createElement('div');

        if (isSystem) {
            // Style spécial pour les messages système (tirages)
            div.style.cssText = 'background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);padding:.75rem 1rem;font-family:Share Tech Mono,monospace;font-size:.75rem;white-space:pre-line;color:var(--yellow)';
            div.innerHTML = `<div style="margin-bottom:.4rem;font-weight:700">🎮 ARENA 221 — OFFICIEL</div>${this._escapeHtml(m.message)}`;
        } else {
            div.className = 'lobby-message' + (isMe ? ' me' : '');
            div.innerHTML = `
                <div class="msg-header">
                    <span class="msg-pseudo" style="color:${this._pseudoColor(m.pseudo)}">${m.pseudo}</span>
                    <span class="msg-time">${this._formatTime(m.created_at)}</span>
                </div>
                <div class="msg-body">${this._escapeHtml(m.message)}</div>
            `;
        }
        container.appendChild(div);
    },

    _scrollBottom(c) { setTimeout(() => c.scrollTop = c.scrollHeight, 50); },
    _pseudoColor(p) {
        const cols = ['#00FF87','#FF2D78','#FFD700','#00bcd4','#ff5722','#9c27b0','#4caf50','#ff9800'];
        let h = 0; for (let i = 0; i < p.length; i++) h = p.charCodeAt(i) + ((h<<5)-h);
        return cols[Math.abs(h) % cols.length];
    },
    _formatTime(d) { return new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); },
    _escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },

    destroy() {
        if (this._channel)        _db.removeChannel(this._channel);
        if (this._sessionChannel) _db.removeChannel(this._sessionChannel);
        this._channel = this._sessionChannel = null;
    }
};

window.addEventListener('hashchange', () => Lobby.destroy());

// ══════════════════════════════════════════════════════════
//  ROUTER — Navigation Arena 221
// ══════════════════════════════════════════════════════════

const Router = {
    routes: {
        '/':              'home',
        '/login':         'login',
        '/signup':        'signup',
        '/tournaments':   'tournaments',
        '/tournament/:id':'tournamentDetail',
        '/leaderboard':   'leaderboard',
        '/lobby':         'lobby',
        '/my-matches':    'myMatches',
        '/dashboard':     'dashboard',
        '/admin':         'admin',
    },

    init() {
        window.addEventListener('hashchange', () => this.handle());
        this.handle();
    },

    handle() {
        let hash = window.location.hash.slice(1) || '/';
        if (hash.includes('?')) hash = hash.split('?')[0];

        document.querySelectorAll('.nav-link').forEach(l => {
            l.classList.toggle('open', l.getAttribute('href') === '#' + hash);
        });
        document.getElementById('navLinks')?.classList.remove('open');
        scrollToTop();

        let page = null, params = {};
        for (const [route, name] of Object.entries(this.routes)) {
            const rp = route.split('/'), hp = hash.split('/');
            if (rp.length !== hp.length) continue;
            let ok = true; const rParams = {};
            for (let i = 0; i < rp.length; i++) {
                if (rp[i].startsWith(':')) rParams[rp[i].slice(1)] = hp[i];
                else if (rp[i] !== hp[i]) { ok = false; break; }
            }
            if (ok) { page = name; params = rParams; break; }
        }

        if (page) this.render(page, params);
        else document.getElementById('app').innerHTML =
            `<div class="container" style="padding:8rem 2rem;text-align:center">
                <div style="font-family:'Anton',sans-serif;font-size:8rem;color:var(--green)">404</div>
                <p style="color:var(--t2);margin-bottom:2rem">Page introuvable</p>
                <a href="#/" class="btn btn-primary">Retour à l'accueil</a>
            </div>`;
    },

    async render(page, params = {}) {
        document.title = {
            home:'Arena 221 — eFootball Sénégal', tournaments:'Tournois — Arena 221',
            leaderboard:'Classement — Arena 221', shop:'Boutique — Arena 221',
            dashboard:'Dashboard — Arena 221', myMatches:'Mes matchs — Arena 221',
            admin:'Administration — Arena 221', login:'Connexion — Arena 221',
            signup:'Inscription — Arena 221', lobby:'Lobby — Arena 221',
        }[page] || 'Arena 221';

        // Vérification auth uniquement pour dashboard et myMatches
        if (['dashboard','myMatches'].includes(page)) {
            const profile = await AppAuth.getProfile();
            if (!profile) {
                window.location.hash = '#/login'; return;
            }
        }
        if (page === 'admin') {
            const profile = await AppAuth.getProfile();
            if (!profile || !AppAuth.isAdmin()) {
                window.location.hash = '#/'; return;
            }
        }

        const app = document.getElementById('app');
        if (!Pages[page]) return;
        app.innerHTML = Pages[page](params.id || null);
        await this.initPage(page, params);
    },

    async initPage(page, params) {
        switch (page) {
            case 'home':             return this.initHome();
            case 'login':            return this.initLogin();
            case 'signup':           return this.initSignup();
            case 'tournaments':      return this.initTournaments();
            case 'tournamentDetail': return this.initTournamentDetail(params.id);
            case 'leaderboard':      return this.initLeaderboard();
            case 'myMatches':        return this.initMyMatches();
            case 'dashboard':        return this.initDashboard();
            case 'admin':            return this.initAdmin();
            case 'lobby':            setTimeout(() => Lobby?.init(), 60); break;
        }
    },

    // ── HOME ────────────────────────────────────────────
    async initHome() {
        const el = document.getElementById('homeTournaments');
        if (!el) return;
        showLoading(el);
        try {
            const ts = await TournamentDB.getAll();
            const open = ts.filter(t => t.status === 'open').slice(0, 3);
            el.innerHTML = open.length ? `<div class="grid grid-3">${open.map(t => renderTournamentCard(t)).join('')}</div>`
                : `<p style="text-align:center;color:var(--t3);font-family:'Share Tech Mono',monospace">Aucun tournoi ouvert pour l'instant</p>`;
        } catch { el.innerHTML = `<p style="text-align:center;color:var(--red)">Erreur de chargement</p>`; }
        document.getElementById('newsletterForm')?.addEventListener('submit', e => {
            e.preventDefault(); showToast('✅ Merci ! Tu seras notifié.', 'success'); e.target.reset();
        });
    },

    // ── LOGIN ───────────────────────────────────────────
    initLogin() {
        document.getElementById('loginForm')?.addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
            try {
                const profile = await AppAuth.login(e.target.email.value, e.target.password.value);
                updateNavbar();
                // Petit délai pour que Supabase stabilise la session avant redirect
                await new Promise(r => setTimeout(r, 300));
                window.location.hash = profile?.role === 'super_admin' ? '#/admin' : '#/dashboard';
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Se connecter';
            }
        });
    },

    // ── SIGNUP ──────────────────────────────────────────
    initSignup() {
        document.getElementById('signupForm')?.addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création...';
            try {
                await AppAuth.signup(e.target.email.value, e.target.password.value,
                    e.target.pseudo.value, e.target.phone?.value);
                window.location.hash = '#/';
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-gamepad"></i> Créer mon compte';
            }
        });
    },

    // ── TOURNAMENTS ─────────────────────────────────────
    async initTournaments() {
        const el = document.getElementById('tournamentsGrid');
        if (!el) return;
        showLoading(el);
        try {
            const ts = await TournamentDB.getAll();
            el.innerHTML = ts.length
                ? ts.map(t => renderTournamentCard(t)).join('')
                : `<p style="text-align:center;color:var(--t3);grid-column:1/-1;font-family:'Share Tech Mono',monospace">Aucun tournoi disponible</p>`;
        } catch { el.innerHTML = `<p style="color:var(--red);text-align:center;grid-column:1/-1">Erreur de chargement</p>`; }
    },

    // ── TOURNAMENT DETAIL ────────────────────────────────
    async initTournamentDetail(id) {
        const el = document.getElementById('tournamentDetail');
        if (!el || !id) return;
        showLoading(el);
        try {
            const t = await TournamentDB.getById(id);
            if (!t) { el.innerHTML = `<p style="text-align:center">Tournoi introuvable</p>`; return; }
            const profile  = await AppAuth.getProfile();
            const regs     = t.registrations || [];
            const confirmed = regs.filter(r => r.payment_status === 'confirmed');
            const myReg    = profile && regs.find(r => r.player?.id === profile.id);
            const isFull   = confirmed.length >= t.max_players;
            const statusColors = { open:'var(--green)', in_progress:'var(--yellow)', completed:'var(--t3)', cancelled:'var(--red)' };
            const statusLabels = { open:'Inscriptions ouvertes', in_progress:'En cours', completed:'Terminé', cancelled:'Annulé' };

            el.innerHTML = `
            <a href="#/tournaments" class="btn btn-ghost btn-sm" style="margin-bottom:1.5rem;display:inline-flex">
                <i class="fas fa-arrow-left"></i> Tous les tournois
            </a>
            <div class="grid grid-2" style="gap:2rem;align-items:start">
                <!-- LEFT -->
                <div>
                    <div class="card" style="margin-bottom:1.5rem;border-color:rgba(0,255,135,.2)">
                        <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem">
                            <div>
                                <div class="eyebrow">${statusLabels[t.status] || t.status}</div>
                                <h1 style="font-family:'Anton',sans-serif;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:.03em;line-height:1;text-transform:uppercase">${t.name}</h1>
                            </div>
                            <div style="text-align:right">
                                <div style="font-family:'Anton',sans-serif;font-size:2.5rem;color:var(--yellow);line-height:1">${formatCurrency(t.prize_pool)}</div>
                                <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:2px">PRIZE POOL</div>
                            </div>
                        </div>
                        <p style="color:var(--t2);margin-bottom:1.5rem;line-height:1.7">${t.description || ''}</p>
                        <div class="stats-row" style="margin-top:0">
                            <div class="stat-item"><div class="stat-num" style="font-size:2rem">${formatCurrency(t.entry_fee)}</div><div class="stat-lbl">Frais d'inscription</div></div>
                            <div class="stat-item"><div class="stat-num" style="font-size:2rem">${confirmed.length}/${t.max_players}</div><div class="stat-lbl">Participants</div></div>
                            <div class="stat-item"><div class="stat-num" style="font-size:2rem">${t.start_date ? formatShortDate(t.start_date) : '—'}</div><div class="stat-lbl">Date début</div></div>
                        </div>

                    <!-- Participants -->
                    <div class="card">
                        <h3 style="font-family:'Anton',sans-serif;font-size:1.3rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem">
                            Participants (${confirmed.length})
                        </h3>
                        ${confirmed.length ? confirmed.map((r, i) => `
                            <div style="display:flex;align-items:center;gap:12px;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.05)">
                                <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--pink));display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;color:var(--black);font-size:.9rem;flex-shrink:0">${i+1}</div>
                                <div style="font-weight:700">${r.player?.pseudo || '?'}</div>
