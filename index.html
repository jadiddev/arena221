        } catch(err) { el.innerHTML = `<p style="color:var(--red);text-align:center">${err.message}</p>`; }
    },

    _renderRegBox(t, profile, myReg, isFull) {
        if (!profile) return `
            <h3 style="font-family:'Anton',sans-serif;font-size:1.4rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem">S'inscrire</h3>
            <p style="color:var(--t2);margin-bottom:1.5rem">Connecte-toi pour t'inscrire à ce tournoi.</p>
            <a href="#/login" class="btn btn-primary" style="width:100%"><i class="fas fa-right-to-bracket"></i> Se connecter</a>`;

        if (myReg) {
            const statusMap = {
                pending:   { color:'var(--yellow)', icon:'⏳', text:'En attente de confirmation' },
                confirmed: { color:'var(--green)',  icon:'✅', text:'Inscription confirmée !' },
                rejected:  { color:'var(--red)',    icon:'❌', text:'Paiement rejeté — contacte l\'admin' }
            };
            const s = statusMap[myReg.payment_status] || statusMap.pending;
            return `
                <h3 style="font-family:'Anton',sans-serif;font-size:1.4rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1.25rem">Ton inscription</h3>
                <div style="text-align:center;padding:2rem;background:rgba(0,0,0,.3);border:1px solid ${s.color}25;border-radius:4px">
                    <div style="font-size:2.5rem;margin-bottom:.75rem">${s.icon}</div>
                    <div style="font-weight:700;color:${s.color};font-size:1.05rem">${s.text}</div>
                    ${myReg.payment_status === 'pending' ? `<p style="color:var(--t3);font-size:.8rem;margin-top:.75rem;font-family:'Share Tech Mono',monospace">L'admin confirme sous 2h après réception du paiement</p>` : ''}
                </div>
                ${myReg.payment_status === 'pending' ? `
                <div style="margin-top:1.25rem;padding:1rem;background:rgba(0,255,135,.05);border:1px solid rgba(0,255,135,.15)">
                    <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Rappel paiement</div>
                    <div style="font-weight:700">Envoyer ${formatCurrency(t.entry_fee)} à :</div>
                    <div style="margin-top:.5rem;color:var(--green);font-family:'Share Tech Mono',monospace">${CONFIG.ADMIN_PHONE}</div>
                    <div style="font-size:.8rem;color:var(--t3);margin-top:.25rem">Motif : "Arena221 ${profile?.pseudo}"</div>
                </div>` : ''}`;
        }

        if (t.status !== 'open' || isFull) return `
            <h3 style="font-family:'Anton',sans-serif;font-size:1.4rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem">Inscription</h3>
            <div style="text-align:center;padding:2rem;color:var(--t3)">
                ${isFull ? '🔒 Tournoi complet' : '🚫 Inscriptions fermées'}
            </div>`;

        return `
            <h3 style="font-family:'Anton',sans-serif;font-size:1.4rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem">S'inscrire</h3>
            <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);margin-bottom:1.5rem">Frais : <span style="color:var(--yellow);font-size:1rem;font-family:'Anton',sans-serif">${formatCurrency(t.entry_fee)}</span></div>

            <div style="margin-bottom:1.25rem">
                <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.75rem">Choisir le moyen de paiement</div>
                <div style="display:flex;flex-direction:column;gap:.5rem" id="payMethodList">
                    ${CONFIG.PAYMENT_METHODS.map(m => `
                        <label class="pay-method" style="cursor:pointer">
                            <input type="radio" name="payMethod" value="${m.id}" style="display:none">
                            <div class="pay-icon" style="background:${m.color}22;color:${m.color}">${m.icon}</div>
                            <div><div class="pay-name">${m.label}</div><div class="pay-info">${m.phone}</div></div>
                            <i class="fas fa-circle-check pay-arrow" style="display:none;color:var(--green)"></i>
                        </label>
                    `).join('')}
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ton numéro de téléphone</label>
                <input type="tel" id="regPhone" class="form-input" placeholder="77 454 92 51">
            </div>

            <button id="regBtn" class="btn btn-primary" style="width:100%;margin-top:.5rem" disabled>
                <i class="fas fa-lock"></i> Sélectionne un moyen de paiement
            </button>

            <div id="payInstructions" style="display:none;margin-top:1.25rem"></div>`;
    },

    _initRegBox(t, profile, myReg, isFull) {
        if (!profile || myReg || t.status !== 'open' || isFull) return;

        document.querySelectorAll('#payMethodList .pay-method').forEach(label => {
            label.addEventListener('click', () => {
                document.querySelectorAll('#payMethodList .pay-method').forEach(l => {
                    l.classList.remove('selected');
                    l.querySelector('.fa-circle-check').style.display = 'none';
                });
                label.classList.add('selected');
                label.querySelector('.fa-circle-check').style.display = 'block';
                label.querySelector('input').checked = true;

                const method = CONFIG.PAYMENT_METHODS.find(m => m.id === label.querySelector('input').value);
                const btn = document.getElementById('regBtn');
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-right-to-bracket"></i> S'inscrire avec ${method.label}`;

                // Afficher instructions
                const inst = document.getElementById('payInstructions');
                inst.style.display = 'block';
                if (method.id === 'whatsapp') {
                    const msg = encodeURIComponent(`Bonjour, je souhaite m'inscrire au tournoi ${t.name} sur Arena 221.\nPseudo: ${profile.pseudo}\nMontant: ${t.entry_fee} FCFA`);
                    inst.innerHTML = `
                        <div class="pay-instructions">
                            <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem">Instructions</div>
                            <div class="step"><div class="step-num">1</div><div class="step-txt">Clique le bouton WhatsApp ci-dessous pour envoyer un message à l'admin</div></div>
                            <div class="step"><div class="step-num">2</div><div class="step-txt">Effectue le virement de <strong>${formatCurrency(t.entry_fee)}</strong></div></div>
                            <div class="step"><div class="step-num">3</div><div class="step-txt">Clique "S'inscrire" pour confirmer ta demande</div></div>
                            <a href="https://wa.me/${CONFIG.ADMIN_WHATSAPP}?text=${msg}" target="_blank" class="btn btn-sm" style="background:#25d366;color:white;clip-path:none;border-radius:4px;margin-top:.75rem;width:100%;justify-content:center">
                                <i class="fab fa-whatsapp"></i> Ouvrir WhatsApp
                            </a>
                        </div>`;
                } else {
                    inst.innerHTML = `
                        <div class="pay-instructions">
                            <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem">Instructions de paiement</div>
                            <div class="step"><div class="step-num">1</div><div class="step-txt">Envoie <strong>${formatCurrency(t.entry_fee)}</strong> au numéro :</div></div>
                            <div style="padding:.5rem 1rem .5rem 2.5rem">
                                <div class="code-box" onclick="copyToClipboard('${method.phone}')">${method.icon} ${method.phone} <i class="fas fa-copy" style="opacity:.5"></i></div>
                            </div>
                            <div class="step"><div class="step-num">2</div><div class="step-txt">Motif : <strong>"Arena221 ${profile.pseudo}"</strong></div></div>
                            <div class="step"><div class="step-num">3</div><div class="step-txt">Clique "S'inscrire" — l'admin confirme sous 2h</div></div>
                        </div>`;
                }
            });
        });

        document.getElementById('regBtn')?.addEventListener('click', async () => {
            const method = document.querySelector('#payMethodList input:checked')?.value;
            if (!method) return showToast('Choisis un moyen de paiement', 'warning');
            const phone = document.getElementById('regPhone')?.value;
            const btn   = document.getElementById('regBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                await RegistrationDB.register(t.id, method, phone);
                showToast('✅ Inscription soumise ! L\'admin va confirmer ton paiement.', 'success');
                await this.initTournamentDetail(t.id);
            } catch(err) {
                showToast(err.message, 'error');
                btn.disabled = false; btn.innerHTML = `<i class="fas fa-right-to-bracket"></i> S'inscrire`;
            }
        });
    },

    // ── LEADERBOARD ─────────────────────────────────────
    async initLeaderboard() {
        const el = document.getElementById('leaderboardTable');
        if (!el) return;
        showLoading(el);
        try {
            const rows = await LeaderboardDB.get();
            el.innerHTML = rows.length ? `
                <div style="overflow-x:auto">
                <table class="table">
                    <thead><tr>
                        <th>#</th><th>Joueur</th><th>Pts</th>
                        <th>V</th><th>N</th><th>D</th>
                        <th>BP</th><th>BC</th><th>Diff</th>
                        <th>Matchs</th>
                    </tr></thead>
                    <tbody>${rows.map(p => `
                        <tr>
                            <td><span class="${p.rank<=3?'rank-'+p.rank:''}">${p.rank<=3?['🥇','🥈','🥉'][p.rank-1]:'#'+p.rank}</span></td>
                            <td><b>${p.pseudo}</b></td>
                            <td style="color:var(--green);font-family:'Anton',sans-serif;font-size:1.1rem">${p.points}</td>
                            <td style="color:var(--green)">${p.wins}</td>
                            <td style="color:var(--yellow)">${p.draws}</td>
                            <td style="color:var(--red)">${p.losses}</td>
                            <td>${p.goals_for}</td>
                            <td>${p.goals_against}</td>
                            <td style="color:${p.goal_diff>=0?'var(--green)':'var(--red)'}">${p.goal_diff>0?'+':''}${p.goal_diff}</td>
                            <td style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.8rem">${p.total_matches}</td>
                        </tr>`).join('')}
                    </tbody>
                </table></div>`
            : `<p style="text-align:center;padding:3rem;color:var(--t3);font-family:'Share Tech Mono',monospace">Aucun joueur dans le classement</p>`;
        } catch { el.innerHTML = `<p style="color:var(--red);text-align:center;padding:2rem">Erreur de chargement</p>`; }
    },

    // ── MES MATCHS ──────────────────────────────────────
    async initMyMatches() {
        const pending = document.getElementById('pendingMatches');
        const history = document.getElementById('matchHistory');
        if (!pending || !history) return;

        showLoading(pending); showLoading(history);
        const profile = await AppAuth.getProfile();
        if (!profile) return;

        try {
            const [toPlay, done] = await Promise.all([
                MatchDB.getMyPending(), MatchDB.getMyHistory()
            ]);

            // À jouer
            pending.innerHTML = toPlay.length ? toPlay.map(m => {
                const isP1  = m.player1_id === profile.id;
                const opp   = isP1 ? m.p2 : m.p1;
                const sl    = MatchDB.statusLabel(m.status);
                const hasReported = m.status === 'waiting' && (
                    (isP1 && m.report1?.player_id === profile.id) ||
                    (!isP1 && m.report1?.player_id === profile.id)
                );
                return `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);margin-bottom:.75rem;gap:1rem;flex-wrap:wrap">
                    <div>
                        <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);margin-bottom:.25rem">${m.tournament?.name || 'Tournoi'}</div>
                        <div style="font-weight:700;font-size:1.05rem">VS <span style="color:var(--green)">${opp?.pseudo || '?'}</span></div>
                        ${m.deadline ? `<div style="font-size:.75rem;color:var(--t3);margin-top:.2rem;font-family:'Share Tech Mono',monospace">Deadline : ${formatShortDate(m.deadline)}</div>` : ''}
                    </div>
                    <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
                        <span style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:${sl.color}">${sl.icon} ${sl.text}</span>
                        ${!hasReported ? `<button onclick="showScoreModal('${m.id}','${opp?.pseudo||'?'}')" class="btn btn-sm btn-primary"><i class="fas fa-pen"></i> Reporter le score</button>`
                        : `<span style="font-size:.8rem;color:#00bcd4;font-family:'Share Tech Mono',monospace">Score soumis ✓</span>`}
                    </div>
                </div>`;
            }).join('') : `<p style="text-align:center;padding:2rem;color:var(--t3);font-family:'Share Tech Mono',monospace">Aucun match en attente 🎉</p>`;

            // Historique
            history.innerHTML = done.length ? done.map(m => {
                const isP1  = m.player1_id === profile.id;
                const opp   = isP1 ? m.p2 : m.p1;
                const myS   = isP1 ? m.score1 : m.score2;
                const oppS  = isP1 ? m.score2 : m.score1;
                const won   = myS > oppS;
                const draw  = myS === oppS;
                return `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid rgba(255,255,255,.05);gap:1rem;flex-wrap:wrap">
                    <div>
                        <div style="font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--t3)">${m.tournament?.name || 'Tournoi'} · ${timeAgo(m.completed_at)}</div>
                        <div style="font-weight:700;margin-top:.2rem">VS ${opp?.pseudo || '?'}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:.75rem">
                        <div style="font-family:'Anton',sans-serif;font-size:1.8rem;letter-spacing:.05em;color:${won?'var(--green)':draw?'var(--yellow)':'var(--red)'}">${myS} — ${oppS}</div>
                        <span style="font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:3px 10px;border:1px solid;color:${won?'var(--green)':draw?'var(--yellow)':'var(--red)'};border-color:currentColor">${won?'VICTOIRE':draw?'NUL':'DÉFAITE'}</span>
                    </div>
                </div>`;
            }).join('') : `<p style="text-align:center;padding:2rem;color:var(--t3);font-family:'Share Tech Mono',monospace">Aucun match joué</p>`;

        } catch(err) {
            pending.innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
        }
    },

    // ── DASHBOARD ───────────────────────────────────────
    async initDashboard() {
        const profile = await AppAuth.getProfile();
        if (!profile) return;
        document.getElementById('dashPseudo').textContent = profile.pseudo;
        document.getElementById('dashWins').textContent   = profile.wins;
        document.getElementById('dashDraws').textContent  = profile.draws;
        document.getElementById('dashLosses').textContent = profile.losses;
        document.getElementById('dashPoints').textContent = profile.points;
        const total = profile.wins + profile.draws + profile.losses;
        document.getElementById('dashMatches').textContent = total;
        document.getElementById('dashGoalFor').textContent  = profile.goals_for;
        document.getElementById('dashGoalAga').textContent  = profile.goals_against;
        const wr = total ? Math.round(profile.wins/total*100) : 0;
        document.getElementById('dashWinrate').textContent = wr + '%';
        document.getElementById('dashWinBar').style.width  = wr + '%';

        const regsEl = document.getElementById('dashRegs');
        if (regsEl) {
            showLoading(regsEl);
            try {
                const regs = await RegistrationDB.getMyRegistrations();
                regsEl.innerHTML = regs.length ? regs.map(r => {
                    const s = {pending:'⏳ En attente',confirmed:'✅ Confirmé',rejected:'❌ Rejeté'}[r.payment_status];
                    const c = {pending:'var(--yellow)',confirmed:'var(--green)',rejected:'var(--red)'}[r.payment_status];
                    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:.875rem 0;border-bottom:1px solid rgba(255,255,255,.05)">
                        <div><div style="font-weight:700">${r.tournament?.name||'?'}</div><div style="font-size:.75rem;color:var(--t3);font-family:'Share Tech Mono',monospace">${formatCurrency(r.tournament?.entry_fee||0)}</div></div>
                        <span style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:${c}">${s}</span>
                    </div>`;
                }).join('') : `<p style="color:var(--t3);font-size:.85rem;padding:1rem 0;font-family:'Share Tech Mono',monospace">Aucune inscription</p>`;
            } catch { regsEl.innerHTML = ''; }
        }
    },

        // Stats
        try {

            document.getElementById('adminTournaments').textContent = stats.tournaments;
            document.getElementById('adminMatches').textContent     = stats.matches;
            document.getElementById('adminRevenue').textContent     = formatCurrency(stats.revenue);

        // Paiements en attente

            try {
                const pending = await RegistrationDB.getPending();
                pendingEl.innerHTML = pending.length ? pending.map(r => `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.1);margin-bottom:.5rem;flex-wrap:wrap;gap:.75rem">
                        <div>
                            <div><b>${r.player?.pseudo||'?'}</b> — <span style="color:var(--yellow);font-family:'Anton',sans-serif">${formatCurrency(r.tournament?.entry_fee||0)}</span></div>
                            <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:3px">

                            </div>
                        </div>
                        <div style="display:flex;gap:6px">
                            <button onclick="AdminActions.confirmPayment('${r.id}')" class="btn btn-sm" style="background:rgba(0,255,135,.1);border:1px solid rgba(0,255,135,.3);color:var(--green);clip-path:none;border-radius:4px"><i class="fas fa-check"></i> Confirmer</button>
                            <button onclick="AdminActions.rejectPayment('${r.id}')" class="btn btn-sm" style="background:rgba(255,61,0,.1);border:1px solid rgba(255,61,0,.3);color:var(--red);clip-path:none;border-radius:4px"><i class="fas fa-times"></i></button>
                        </div>
                    </div>`) .join('') : `<p style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:.75rem 0">Aucun paiement en attente ✅</p>`;
            } catch {}
        }

        // Litiges
        const disputesEl = document.getElementById('adminDisputes');
        if (disputesEl) {
            try {
                const disputes = await MatchDB.getDisputes();
                disputesEl.innerHTML = disputes.length ? disputes.map(d => {
                    const m = d.match;
                    return `
                    <div style="padding:1rem;background:rgba(255,61,0,.05);border:1px solid rgba(255,61,0,.2);margin-bottom:.75rem">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
                            <div>
                                <b>${m?.p1?.pseudo||'?'}</b> VS <b>${m?.p2?.pseudo||'?'}</b>
                                <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:4px">
                                    ${m?.report1 ? `${m.p1?.pseudo} dit: ${m.report1.score1}-${m.report1.score2}` : ''}
                                    ${m?.report2 ? ` · ${m.p2?.pseudo} dit: ${m.report2.score1}-${m.report2.score2}` : ''}
                                </div>
                            </div>
                            <button onclick="AdminActions.openScoreModal('${m?.id}','${m?.p1?.pseudo||'?'}','${m?.p2?.pseudo||'?'}')" class="btn btn-sm" style="background:rgba(255,61,0,.15);border:1px solid rgba(255,61,0,.4);color:var(--red);clip-path:none;border-radius:4px">
                                <i class="fas fa-gavel"></i> Trancher
                            </button>
                        </div>
                    </div>`; }).join('')
                    : `<p style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:.75rem 0">Aucun litige en cours ✅</p>`;
            } catch {}
        }

        // Tournois
        await this.refreshAdminTournaments();

        // Utilisateurs
        const usersEl = document.getElementById('adminUsersTable');
        if (usersEl) {
            try {
                const users = await AdminDB.getAllUsers();
                usersEl.innerHTML = users.map(u => `
                    <tr>
                        <td><b>${u.pseudo}</b></td>
                        <td style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.75rem">${u.role==='super_admin'?'—':u.role==='tournament_admin'?'—':''}</td>
                        <td><span class="badge ${u.role==='super_admin'?'badge-ok':u.role==='tournament_admin'?'badge-warn':''}">${u.role}</span></td>
                        <td style="display:flex;gap:6px">
                            ${u.role==='player'?`<button onclick="AdminActions.promote('${u.id}','tournament_admin')" class="btn btn-sm btn-secondary" style="clip-path:none;border-radius:4px;font-size:.7rem">→ Admin tournoi</button>`:''}
                        </td>

        }

        // Transactions
        const txEl = document.getElementById('adminTransactions');
        if (txEl) {
            try {
                const txs = await AdminDB.getRecentPayments();
                txEl.innerHTML = txs.map(p => `
                    <tr>
                        <td style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.75rem">${timeAgo(p.created_at)}</td>
                        <td><b>${p.player?.pseudo||'?'}</b></td>
                        <td><span class="badge ${p.status==='confirmed'?'badge-ok':p.status==='rejected'?'badge-err':'badge-warn'}">${p.type}</span></td>
                        <td style="font-family:'Share Tech Mono',monospace;color:var(--green)">${formatCurrency(p.amount)}</td>
                    </tr>`).join('');
            } catch {}
        }
    },

    async refreshAdminTournaments() {
        const el = document.getElementById('adminTournamentsList');
        if (!el) return;
        showLoading(el);
        try {
            const ts = await TournamentDB.getAll();
            el.innerHTML = ts.length ? ts.map(t => {
                const regs = t.registrations || [];
                const confirmed = Array.isArray(regs) ? regs.filter?.(r=>r.payment_status==='confirmed').length : (regs[0]?.count || 0);
                return `
                <div class="card" style="margin-bottom:1rem;border-color:rgba(0,255,135,.1)">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
                        <div>
                            <div style="font-family:'Anton',sans-serif;font-size:1.2rem;text-transform:uppercase;letter-spacing:.04em">${t.name}</div>
                            <div style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:2px">
                                ${formatCurrency(t.entry_fee)} · Prize: ${formatCurrency(t.prize_pool)} · ${confirmed}/${t.max_players} joueurs
                                <span style="color:${t.status==='open'?'var(--green)':t.status==='in_progress'?'var(--yellow)':'var(--t3)'}"> · ${t.status}</span>
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap">
                            <button onclick="AdminActions.generateMatches('${t.id}')" class="btn btn-sm btn-primary"><i class="fas fa-shuffle"></i> Générer matchs</button>
                            <button onclick="AdminActions.viewMatches('${t.id}')" class="btn btn-sm btn-secondary" style="clip-path:none;border-radius:4px"><i class="fas fa-list"></i> Voir matchs</button>
                            ${t.status==='open'?`<button onclick="AdminActions.closeRegistrations('${t.id}')" class="btn btn-sm btn-secondary" style="clip-path:none;border-radius:4px;color:var(--yellow);border-color:rgba(255,215,0,.3)"><i class="fas fa-lock"></i> Fermer</button>`:''}
                            <button onclick="AdminActions.deleteTournament('${t.id}','${t.name}')" class="btn btn-sm" style="clip-path:none;border-radius:4px;background:rgba(255,61,0,.15);border:1px solid rgba(255,61,0,.4);color:var(--red)"><i class="fas fa-trash"></i> Supprimer</button>
                        </div>
                    </div>
                    <div id="matchesPanel_${t.id}" style="display:none;margin-top:1rem;border-top:1px solid rgba(255,255,255,.06);padding-top:1rem"></div>
                </div>`;
            }).join('') : `<p style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:1rem 0">Aucun tournoi créé</p>`;
        } catch {}
    }
};

//  ADMIN ACTIONS (modals + actions)
// ══════════════════════════════════════════════════════════
const AdminActions = {
    async confirmPayment(regId) {
        // Feedback immédiat sur le bouton
        const btn = document.querySelector(`button[onclick*="${regId}"]`);
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
        try {
            await RegistrationDB.confirm(regId, '');
            await Router.initAdmin();
        }
        catch(e) { showToast(e.message, 'error'); if (btn) { btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Confirmer'; } }
    },

    async rejectPayment(regId) {
        if (!confirm('Rejeter ce paiement ?')) return;
        try { await RegistrationDB.reject(regId); Router.initAdmin(); }
        catch(e) { showToast(e.message,'error'); }
    },

    async generateMatches(tid) {
        if (!confirm('Générer les matchs ? Les anciens seront supprimés.')) return;
        try { await TournamentDB.generateMatches(tid); Router.refreshAdminTournaments(); }
        catch(e) { showToast(e.message,'error'); }
    },

    async viewMatches(tid) {
        const panel = document.getElementById('matchesPanel_' + tid);
        if (!panel) return;
        if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        showLoading(panel);
        try {
            const matches = await MatchDB.getForTournament(tid);
            if (!matches.length) {
                panel.innerHTML = `<p style="color:var(--t3);font-family:'Share Tech Mono',monospace;font-size:.8rem">Aucun match généré</p>`;
                return;
            }
            const done  = matches.filter(m=>m.status==='completed').length;
            const total = matches.length;
            panel.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">
                    <div style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--t3)">
                        ${done}/${total} matchs terminés
                    </div>
                    <button onclick="AdminActions.openResultsTable('${tid}')" class="btn btn-sm" style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--yellow);clip-path:none;border-radius:4px">
                        <i class="fas fa-table"></i> Tableau des résultats
                    </button>
                </div>
                <div style="overflow-x:auto">
                <table class="table" style="width:100%;font-size:.85rem">
                    <thead><tr>
                        <th style="text-align:right">Joueur 1</th>
                        <th style="text-align:center;width:90px">Score</th>
                        <th>Joueur 2</th>
                        <th style="text-align:center;width:80px">Statut</th>
                        <th style="text-align:center;width:80px">Actions</th>
                    </tr></thead>
                    <tbody>
                    ${matches.map(m => {
                        const sl    = MatchDB.statusLabel(m.status);
                        const score = m.status==='completed' ? `<span style="color:var(--green);font-family:'Anton',sans-serif;font-size:1.1rem">${m.score1}—${m.score2}</span>` : `<span style="color:var(--t3)">·—·</span>`;
                        const canEdit = m.status!=='completed' && m.status!=='cancelled';
                        return `<tr>
                            <td style="text-align:right;font-weight:700">${m.p1?.pseudo||'?'}</td>
                            <td style="text-align:center">${score}</td>
                            <td style="font-weight:700">${m.p2?.pseudo||'?'}</td>
                            <td style="text-align:center"><span style="font-family:'Share Tech Mono',monospace;font-size:.6rem;color:${sl.color}">${sl.icon} ${sl.text}</span></td>
                            <td style="text-align:center">
                                <div style="display:flex;gap:4px;justify-content:center">
                                ${canEdit ? `
                                    <button title="Saisir score" onclick="AdminActions.openScoreModal('${m.id}','${m.p1?.pseudo||'?'}','${m.p2?.pseudo||'?'}')" style="background:rgba(0,255,135,.1);border:1px solid rgba(0,255,135,.3);color:var(--green);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.75rem"><i class="fas fa-pen"></i></button>
                                    <button title="Annuler" onclick="AdminActions.cancelMatch('${m.id}')" style="background:rgba(255,61,0,.1);border:1px solid rgba(255,61,0,.3);color:var(--red);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.75rem"><i class="fas fa-times"></i></button>
                                ` : (m.status==='completed' ? `<button title="Modifier" onclick="AdminActions.openScoreModal('${m.id}','${m.p1?.pseudo||'?'}','${m.p2?.pseudo||'?'}')" style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--yellow);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.75rem"><i class="fas fa-pen"></i></button>` : '')}
                                </div>
                            </td>
                        </tr>`;
                    }).join('')}
                    </tbody>
                </table>
                </div>
            `;
        } catch(e) { panel.innerHTML = `<p style="color:var(--red)">${e.message}</p>`; }
    },

    async openResultsTable(tid) {
        const matches = await MatchDB.getForTournament(tid);
        // Construire classement
        const players = {};
        matches.forEach(m => {
            [m.p1?.pseudo, m.p2?.pseudo].forEach(p => { if(p && !players[p]) players[p]={pseudo:p,j:0,g:0,n:0,p:0,bp:0,bc:0,pts:0}; });
            if (m.status === 'completed') {
                const p1 = players[m.p1?.pseudo], p2 = players[m.p2?.pseudo];
                if (!p1||!p2) return;
                p1.j++; p2.j++; p1.bp+=m.score1; p1.bc+=m.score2; p2.bp+=m.score2; p2.bc+=m.score1;
                if (m.score1>m.score2)      { p1.g++; p1.pts+=3; p2.p++; }
                else if (m.score1<m.score2) { p2.g++; p2.pts+=3; p1.p++; }
                else                        { p1.n++; p2.n++; p1.pts++; p2.pts++; }
            }
        });
        const sorted = Object.values(players).sort((a,b)=>b.pts-a.pts||(b.bp-b.bc)-(a.bp-a.bc));
        const modal = document.createElement('div');
        modal.className = 'modal-overlay'; modal.id = 'resultsModal';
        modal.innerHTML = `
            <div class="card modal-content" style="max-width:700px;border-color:rgba(255,215,0,.2);padding:1.5rem">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
                    <div style="font-family:'Anton',sans-serif;font-size:1.5rem;text-transform:uppercase;letter-spacing:.04em">
                        <i class="fas fa-table" style="color:var(--yellow)"></i> Tableau des résultats
                    </div>
                    <button onclick="document.getElementById('resultsModal').remove()" style="background:none;border:none;color:var(--t3);font-size:1.3rem;cursor:pointer">✕</button>
                </div>

                <!-- Classement -->
                <div style="margin-bottom:1.5rem">
                    <div style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--yellow);margin-bottom:.75rem;text-transform:uppercase">📊 Classement</div>
                    <div style="overflow-x:auto">
                    <table class="table" style="width:100%;font-size:.82rem">
                        <thead><tr>
                            <th>#</th><th>Joueur</th>
                            <th style="text-align:center">J</th>
                            <th style="text-align:center">G</th>
                            <th style="text-align:center">N</th>
                            <th style="text-align:center">P</th>
                            <th style="text-align:center">BP</th>
                            <th style="text-align:center">BC</th>
                            <th style="text-align:center">Diff</th>
                            <th style="text-align:center">PTS</th>
                        </tr></thead>
                        <tbody>
                        ${sorted.map((p,i) => `
                            <tr style="${i===0?'background:rgba(255,215,0,.06)':i<3?'background:rgba(0,255,135,.03)':''}">
                                <td style="font-family:'Anton',sans-serif;color:${i===0?'var(--yellow)':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--t3)'}">${i+1}</td>
                                <td style="font-weight:700">${p.pseudo}</td>
                                <td style="text-align:center;color:var(--t3)">${p.j}</td>
                                <td style="text-align:center;color:var(--green)">${p.g}</td>
                                <td style="text-align:center;color:var(--t3)">${p.n}</td>
                                <td style="text-align:center;color:var(--red)">${p.p}</td>
                                <td style="text-align:center">${p.bp}</td>
                                <td style="text-align:center">${p.bc}</td>
                                <td style="text-align:center;color:${p.bp-p.bc>=0?'var(--green)':'var(--red)'}">${p.bp-p.bc>0?'+':''}${p.bp-p.bc}</td>
                                <td style="text-align:center;font-family:'Anton',sans-serif;font-size:1rem;color:var(--yellow)">${p.pts}</td>
                            </tr>
                        `).join('')}
                        </tbody>
                    </table>
                    </div>
                </div>

                <!-- Résultats détaillés -->
                <div>
                    <div style="font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--t3);margin-bottom:.75rem;text-transform:uppercase">⚽ Résultats des matchs</div>
                    <div style="display:flex;flex-direction:column;gap:.35rem;max-height:280px;overflow-y:auto">
                    ${matches.map(m => {
                        const sl = MatchDB.statusLabel(m.status);
                        const score = m.status==='completed' ? `${m.score1} — ${m.score2}` : '? — ?';
                        const winner = m.status==='completed' ? (m.score1>m.score2?m.p1?.pseudo:m.score2>m.score1?m.p2?.pseudo:'Nul') : null;
                        return `
                        <div style="display:grid;grid-template-columns:1fr 90px 1fr;gap:.5rem;align-items:center;padding:.5rem .75rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)">
                            <div style="text-align:right;font-weight:700;${m.status==='completed'&&m.score1>m.score2?'color:var(--green)':''}">${m.p1?.pseudo||'?'}</div>
                            <div style="text-align:center;font-family:'Anton',sans-serif;font-size:1.1rem;color:${sl.color}">${score}</div>
                            <div style="font-weight:700;${m.status==='completed'&&m.score2>m.score1?'color:var(--green)':''}">${m.p2?.pseudo||'?'}</div>
                        </div>`;
                    }).join('')}
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    },

    openScoreModal(matchId, p1, p2) {
        const m = document.createElement('div'); m.className='modal-overlay'; m.id='scoreModal';
        m.innerHTML=`<div class="card modal-content" style="max-width:400px;border-color:rgba(0,255,135,.25)">
            <div class="corner-accent tl"></div><div class="corner-accent tr"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
                <div style="font-family:'Anton',sans-serif;font-size:1.4rem;text-transform:uppercase"><i class="fas fa-gavel" style="color:var(--green)"></i> Score admin</div>
                <button onclick="document.getElementById('scoreModal').remove()" style="background:none;border:none;color:var(--t3);font-size:1.3rem;cursor:pointer">✕</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:center;margin-bottom:1.5rem">
                <div style="text-align:center">
                    <div style="font-size:.7rem;color:var(--t3);font-family:'Share Tech Mono',monospace;margin-bottom:.5rem">${p1}</div>
                    <input id="s1" type="number" min="0" max="20" value="0" class="form-input" style="text-align:center;font-family:'Anton',sans-serif;font-size:2.5rem;padding:.5rem">
                </div>
                <div style="font-family:'Anton',sans-serif;font-size:2rem;color:var(--t3)">—</div>
                <div style="text-align:center">
                    <div style="font-size:.7rem;color:var(--t3);font-family:'Share Tech Mono',monospace;margin-bottom:.5rem">${p2}</div>
                    <input id="s2" type="number" min="0" max="20" value="0" class="form-input" style="text-align:center;font-family:'Anton',sans-serif;font-size:2.5rem;padding:.5rem">
                </div>
            </div>
            <button onclick="AdminActions._submitScore('${matchId}')" class="btn btn-primary" style="width:100%"><i class="fas fa-check"></i> Confirmer</button>
        </div>`;
        document.body.appendChild(m);
        document.getElementById('s1').focus();
    },

    async _submitScore(matchId) {
        const s1=parseInt(document.getElementById('s1').value), s2=parseInt(document.getElementById('s2').value);
        try { await MatchDB.adminSetScore(matchId,s1,s2); document.getElementById('scoreModal')?.remove(); Router.initAdmin(); }
        catch(e) { showToast(e.message,'error'); }
    },

    async cancelMatch(matchId) {
        if (!confirm('Annuler ce match ?')) return;
        await MatchDB.cancel(matchId);
        showToast('🚫 Match annulé','info');
        Router.initAdmin();
    },

    async closeRegistrations(tid) {
        if (!confirm('Fermer les inscriptions pour ce tournoi ?')) return;
        await TournamentDB.updateStatus(tid,'in_progress');
        showToast('🔒 Inscriptions fermées','info');
        Router.refreshAdminTournaments();
    },

    async deleteTournament(tid, name) {
        if (!confirm(`⚠️ Supprimer le tournoi "${name}" ?\n\nTous les matchs et inscriptions seront supprimés. Cette action est irréversible.`)) return;
        try {
            await _db.from('matches').delete().eq('tournament_id', tid);
            await _db.from('registrations').delete().eq('tournament_id', tid);
            await _db.from('draws').delete().eq('tournament_id', tid);
            const { error } = await _db.from('tournaments').delete().eq('id', tid);
            if (error) throw error;
            showToast('🗑️ Tournoi supprimé !', 'success');
            Router.render('admin');
        } catch(e) {
            showToast('Erreur: ' + e.message, 'error');
        }
    },

    async promote(uid, role) {
        if (!confirm(`Promouvoir cet utilisateur en ${role} ?`)) return;
        await AdminDB.promoteUser(uid, role);
        Router.initAdmin();
    },

    openNewTournament() {
        const m = document.createElement('div'); m.className='modal-overlay'; m.id='newTournModal';
        m.innerHTML=`<div class="card modal-content" style="max-width:500px;border-color:rgba(0,255,135,.2)">
            <div class="corner-accent tl"></div><div class="corner-accent tr"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
                <div style="font-family:'Anton',sans-serif;font-size:1.4rem;text-transform:uppercase"><i class="fas fa-trophy" style="color:var(--green)"></i> Nouveau tournoi</div>
                <button onclick="document.getElementById('newTournModal').remove()" style="background:none;border:none;color:var(--t3);font-size:1.3rem;cursor:pointer">✕</button>
            </div>
            <div class="form-group"><label class="form-label">Nom</label><input id="tName" class="form-input" placeholder="Arena Cup #1" required></div>
            <div class="form-group"><label class="form-label">Description</label><textarea id="tDesc" class="form-input" rows="2" style="resize:vertical" placeholder="Décris le tournoi..."></textarea></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group"><label class="form-label">Frais (FCFA)</label><input id="tFee" type="number" class="form-input" value="1000" min="0"></div>
                <div class="form-group"><label class="form-label">Prize pool (FCFA)</label><input id="tPrize" type="number" class="form-input" value="10000" min="0"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group"><label class="form-label">Max joueurs</label><input id="tMax" type="number" class="form-input" value="16" min="2" max="128"></div>
                <div class="form-group"><label class="form-label">Date de début</label><input id="tDate" type="date" class="form-input"></div>
            </div>
            <button onclick="AdminActions._createTournament()" class="btn btn-primary" style="width:100%"><i class="fas fa-plus"></i> Créer le tournoi</button>
        </div>`;
        document.body.appendChild(m);
    },

    async _createTournament() {
        const name = document.getElementById('tName').value.trim();
        if (!name) return showToast('Nom requis','warning');
        try {
            await TournamentDB.create({
                name, description: document.getElementById('tDesc').value,
                entry_fee: parseInt(document.getElementById('tFee').value)||0,
                prize_pool: parseInt(document.getElementById('tPrize').value)||0,
                max_players: parseInt(document.getElementById('tMax').value)||16,
                start_date: document.getElementById('tDate').value || null
            });
            document.getElementById('newTournModal')?.remove();
            showToast(`✅ Tournoi "${name}" créé !`,'success');
            Router.initAdmin();
        } catch(e) { showToast(e.message,'error'); }
    }
};

        </div>
        <p style="font-size:.8rem;color:var(--t3);margin-bottom:1.25rem;font-family:'Share Tech Mono',monospace">
            ⚠️ L'adversaire devra confirmer le même score. En cas de désaccord, un admin tranchera.
        </p>
        <button onclick="_submitPlayerScore('${matchId}')" class="btn btn-primary" style="width:100%"><i class="fas fa-check"></i> Soumettre</button>
    </div>`;
    document.body.appendChild(m);
    document.getElementById('pMyScore').focus();
};

window._submitPlayerScore = async function(matchId) {
    const my  = parseInt(document.getElementById('pMyScore').value);
    const opp = parseInt(document.getElementById('pOppScore').value);
    const btn = document.querySelector('#playerScoreModal .btn-primary');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        const res = await MatchDB.reportScore(matchId, my, opp);
        document.getElementById('playerScoreModal')?.remove();
        const msg = res?.message || 'Score soumis !';
        showToast(msg.includes('validé') ? `🏆 ${msg}` : `⏳ ${msg}`,
                  msg.includes('validé') ? 'success' : msg.includes('litige') ? 'warning' : 'info');
        Router.initMyMatches();
    } catch(e) {
        showToast(e.message,'error');
        btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Soumettre';
    }
};

// ══════════════════════════════════════════════════════════
//  HELPER — Carte tournoi réutilisable
// ══════════════════════════════════════════════════════════
function renderTournamentCard(t) {
    const regs = t.registrations || [];
    const count = Array.isArray(regs) ? regs.filter?.(r=>r.payment_status==='confirmed').length : (regs[0]?.count||0);
    const pct   = t.max_players ? Math.round(count/t.max_players*100) : 0;
    const statusColor = {open:'var(--green)',in_progress:'var(--yellow)',completed:'var(--t3)',cancelled:'var(--red)'}[t.status]||'var(--t3)';
    const statusLabel = {open:'Inscriptions ouvertes',in_progress:'En cours',completed:'Terminé',cancelled:'Annulé'}[t.status]||t.status;
    return `
    <div class="card hover-lift animate-fadeInUp" style="position:relative">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem">
            <span style="font-family:'Share Tech Mono',monospace;font-size:.62rem;color:${statusColor};border:1px solid ${statusColor}40;padding:3px 10px">${statusLabel}</span>
            <span style="font-family:'Anton',sans-serif;font-size:1.4rem;color:var(--yellow)">${formatCurrency(t.prize_pool)}</span>
        </div>
        <h3 style="font-family:'Anton',sans-serif;font-size:1.5rem;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.5rem;line-height:1.1">${t.name}</h3>
        <p style="color:var(--t3);font-size:.85rem;margin-bottom:1.25rem;font-weight:400;line-height:1.5">${t.description||''}</p>
        <div style="margin-bottom:1rem">
            <div style="display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--t3);margin-bottom:4px">
                <span>Participants</span><span>${count}/${t.max_players}</span>
            </div>
            <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--green)">
                <i class="fas fa-coins"></i> ${formatCurrency(t.entry_fee)}
            </div>
            <a href="#/tournament/${t.id}" class="btn btn-sm btn-primary"><i class="fas fa-eye"></i> Voir</a>
        </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', async () => {
    console.log('%c⚽ ARENA 221', 'font-size:18px;color:#00FF87;font-weight:bold');
    console.log('%cPlateforme eFootball #1 Sénégal', 'color:#FF2D78');

    const app = document.getElementById('app');

    // Vérifier que Supabase est chargé
    if (typeof supabase === 'undefined' || typeof _db === 'undefined') {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:var(--red)">
            <i class="fas fa-exclamation-triangle" style="font-size:3rem;margin-bottom:1rem;display:block"></i>
            <p>Erreur de connexion. Rechargez la page.</p>
            <button onclick="location.reload()" class="btn btn-primary" style="margin-top:1rem">
                <i class="fas fa-rotate"></i> Recharger
            </button>
        </div>`;
        return;
    }

    // Écouter les changements de session
    AppAuth.onStateChange((event) => {
        if (event === 'SIGNED_IN')  updateNavbar();
        if (event === 'SIGNED_OUT') updateNavbar();
    });

    // Charger le profil
    try { await AppAuth.getProfile(); } catch(e) { console.warn(e); }
    updateNavbar();

    // Démarrer le router
    Router.init();

    // Ping toutes les 4 minutes pour garder Supabase actif
    setInterval(() => {
        fetch(`${CONFIG.SUPABASE_URL}/rest/v1/tournaments?select=id&limit=1`, {
            headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` }
        }).catch(() => {});
    }, 4 * 60 * 1000);
});

window.addEventListener('unhandledrejection', e => {
    console.error(e.reason);
    if (e.reason?.message?.includes('JWT') || e.reason?.message?.includes('session')) {
        // Session expirée
        AppAuth.logout();
    }
});

    </script>
